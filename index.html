<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Matahiti Bar</title>

<style>

html,body{

margin:0;
padding:0;
overflow:hidden;
background:black;
width:100%;
height:100%;
font-family:sans-serif;

}

#container{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

overflow:hidden;

background:black;

}

video{

position:absolute;

top:50%;
left:50%;

width:100vw;
height:100vh;

object-fit:cover;

transform:translate(-50%,-50%);

z-index:1;

}

canvas{

display:none;

}

.overlay{

position:absolute;

top:0;
left:0;

width:100%;
height:100%;

object-fit:cover;

pointer-events:none;

z-index:10;

}

.buttons{

position:absolute;

top:50%;

left:0;

width:100%;

transform:translateY(-50%);

z-index:20;

pointer-events:none;

}

.photo{

position:absolute;

left:18px;

top:0;

width:82px;

height:82px;

border-radius:50%;

border:3px solid white;

background:transparent;

color:white;

font-size:36px;

display:flex;

align-items:center;

justify-content:center;

backdrop-filter:blur(4px);

box-shadow:0 0 25px rgba(255,255,255,0.25);

pointer-events:auto;

}

.preview{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:black;

display:none;

justify-content:center;

align-items:center;

flex-direction:column;

z-index:999;

}

.preview img{

width:100%;
height:100%;

object-fit:contain;

}

.storyButton{

position:absolute;

bottom:35px;

left:50%;

transform:translateX(-50%);

padding:14px 22px;

border-radius:30px;

border:2px solid white;

background:rgba(255,255,255,0.08);

backdrop-filter:blur(8px);

color:white;

font-size:16px;

font-weight:bold;

letter-spacing:1px;

}

.help{

position:absolute;

top:40px;

left:50%;

transform:translateX(-50%);

color:white;

font-size:16px;

text-align:center;

opacity:0.8;

}

</style>

</head>

<body>

<div id="container">

<video
id="video"
autoplay
playsinline
muted>
</video>

<canvas id="canvas"></canvas>

<img
src="overlay.png"
class="overlay">

<div class="buttons">

<button
class="photo"
onclick="takePhoto()">

📸

</button>

</div>

</div>

<div
class="preview"
id="preview">

<div class="help">

Maintiens l’image → Ajouter aux Photos

</div>

<img id="previewImage">

<button
class="storyButton"
onclick="openInstagramStory()">

OUVRIR INSTAGRAM STORY

</button>

</div>

<script>

const video =
document.getElementById(
'video'
);

const canvas =
document.getElementById(
'canvas'
);

const ctx =
canvas.getContext(
'2d'
);

navigator.mediaDevices
.getUserMedia({

video:{

facingMode:{
ideal:"environment"
},

width:{
ideal:3840
},

height:{
ideal:2160
}

}

})

.then(stream=>{

video.srcObject =
stream;

});

async function takePhoto(){

canvas.width = 2160;

canvas.height = 3840;

const videoRatio =
video.videoWidth /
video.videoHeight;

const canvasRatio =
2160 / 3840;

let drawWidth;
let drawHeight;
let offsetX;
let offsetY;

if(videoRatio > canvasRatio){

drawHeight = 3840;

drawWidth =
drawHeight *
videoRatio;

offsetX =
(drawWidth - 2160)
/ 2;

offsetY = 0;

}else{

drawWidth = 2160;

drawHeight =
drawWidth /
videoRatio;

offsetX = 0;

offsetY =
(drawHeight - 3840)
/ 2;

}

ctx.drawImage(

video,

-offsetX,

-offsetY,

drawWidth,

drawHeight

);

const overlay =
document.querySelector(
'.overlay'
);

ctx.drawImage(

overlay,

0,

0,

2160,

3840

);

const image =
canvas.toDataURL(
'image/png',
1.0
);

document
.getElementById(
'previewImage'
)
.src = image;

document
.getElementById(
'preview'
)
.style.display = 'flex';

}

function openInstagramStory(){

window.location.href =
'instagram://camera';

setTimeout(function(){

window.open(

'https://instagram.com/matahitibar.andernos',

'_blank'

);

},1000);

}

</script>

</body>

</html>
