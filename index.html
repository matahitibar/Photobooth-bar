<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:sans-serif;
}

video,canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
pointer-events:none;
z-index:10;
}

.buttons{
position:fixed;
bottom:40px;
width:100%;
display:flex;
justify-content:center;
gap:15px;
z-index:20;
}

button{
padding:15px 25px;
border:none;
border-radius:30px;
font-size:18px;
background:white;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>

<canvas id="canvas"></canvas>

<img src="overlay.png" class="overlay">

<div class="buttons">
<button onclick="takePhoto()">📸 Photo</button>
<button onclick="shareInstagram()">Instagram</button>
</div>

<script>

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

navigator.mediaDevices.getUserMedia({
video:{
facingMode:{
ideal:"environment"
}
}
})
.then(stream=>{
video.srcObject = stream;
});

function takePhoto(){

canvas.width = video.videoWidth;
canvas.height = video.videoHeight;

ctx.drawImage(video,0,0,canvas.width,canvas.height);

const overlay = document.querySelector('.overlay');

ctx.drawImage(
overlay,
0,
0,
canvas.width,
canvas.height
);

const link = document.createElement('a');

link.download = 'matahiti-photo.png';

link.href = canvas.toDataURL();

link.click();

alert('Photo sauvegardée 📸');
}

function shareInstagram(){

window.open(
'https://instagram.com/matahitibar.andernos',
'_blank'
);

}

</script>

</body>
</html>
