<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Matahiti Bar</title>

<style>

html,body{

margin:0;
padding:0;
overflow:hidden;
background:black;
width:100%;
height:100%;
font-family:sans-serif;

}

#container{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

overflow:hidden;

background:black;

}

video{

position:absolute;

top:50%;
left:50%;

width:100vw;
height:100vh;

object-fit:cover;

transform:translate(-50%,-50%);

z-index:1;

}

canvas{

display:none;

}

.overlay{

position:absolute;

top:0;
left:0;

width:100%;
height:100%;

object-fit:cover;

pointer-events:none;

z-index:10;

}

.buttons{

position:absolute;

top:50%;

left:0;

width:100%;

transform:translateY(-50%);

display:flex;

justify-content:space-between;

align-items:center;

padding:0 12px;

box-sizing:border-box;

z-index:20;

pointer-events:none;

}

.photo{

width:85px;

height:85px;

border-radius:50%;

border:none;

background:white;

font-size:38px;

display:flex;

align-items:center;

justify-content:center;

box-shadow:0 0 30px rgba(0,0,0,0.5);

pointer-events:auto;

}

.insta{

height:75px;

padding:0 30px;

border:none;

border-radius:40px;

background:white;

font-size:22px;

font-weight:bold;

box-shadow:0 0 30px rgba(0,0,0,0.5);

pointer-events:auto;

}

</style>

</head>

<body>

<div id="container">

<video
id="video"
autoplay
playsinline
muted>
</video>

<canvas id="canvas"></canvas>

<img
src="overlay.png"
class="overlay">

<div class="buttons">

<button
class="photo"
onclick="takePhoto()">

📸

</button>

<button
class="insta"
onclick="openInstagramStory()">

Instagram

</button>

</div>

</div>

<script>

const video =
document.getElementById(
'video'
);

const canvas =
document.getElementById(
'canvas'
);

const ctx =
canvas.getContext(
'2d'
);

navigator.mediaDevices
.getUserMedia({

video:{

facingMode:{
ideal:"environment"
},

width:{
ideal:3840
},

height:{
ideal:2160
}

}

})

.then(stream=>{

video.srcObject =
stream;

})

.catch(error=>{

alert(
'Impossible d’ouvrir la caméra'
);

});

function takePhoto(){

canvas.width = 2160;

canvas.height = 3840;

const videoRatio =
video.videoWidth /
video.videoHeight;

const canvasRatio =
2160 / 3840;

let drawWidth;
let drawHeight;
let offsetX;
let offsetY;

if(videoRatio > canvasRatio){

drawHeight = 3840;

drawWidth =
drawHeight *
videoRatio;

offsetX =
(drawWidth - 2160)
/ 2;

offsetY = 0;

}else{

drawWidth = 2160;

drawHeight =
drawWidth /
videoRatio;

offsetX = 0;

offsetY =
(drawHeight - 3840)
/ 2;

}

ctx.drawImage(

video,

-offsetX,

-offsetY,

drawWidth,

drawHeight

);

const overlay =
document.querySelector(
'.overlay'
);

ctx.drawImage(

overlay,

0,

0,

2160,

3840

);

const image =
canvas.toDataURL(
'image/png',
1.0
);

const link =
document.createElement(
'a'
);

link.href = image;

link.download =
'matahiti-4k-story.png';

link.click();

}

function openInstagramStory(){

window.location.href =
'instagram://camera';

setTimeout(function(){

window.open(

'https://instagram.com/matahitibar.andernos',

'_blank'

);

},1000);

}

</script>

</body>

</html>
