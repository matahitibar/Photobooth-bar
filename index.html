<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
overflow:hidden;
background:black;
}

video{
position:fixed;
width:100%;
height:100%;
object-fit:cover;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
pointer-events:none;
z-index:10;
}

.text{
position:fixed;
bottom:40px;
width:100%;
text-align:center;
color:white;
font-size:28px;
font-family:sans-serif;
z-index:20;
text-shadow:0 0 10px black;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>

<img src="overlay.png" class="overlay">

<div class="text">
@matahitibar.andernos
</div>

<script>

navigator.mediaDevices.getUserMedia({
video:{
facingMode:{
exact:"environment"
}
}
})
.then(function(stream){
document.getElementById("video").srcObject = stream;
})
.catch(function(){
navigator.mediaDevices.getUserMedia({
video:true
})
.then(function(stream){
document.getElementById("video").srcObject = stream;
});
});

</script>

</body>
</html>
