<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Matahiti Bar</title>

<style>

html,body{
margin:0;
padding:0;
overflow:hidden;
background:black;
width:100%;
height:100%;
font-family:sans-serif;
}

#container{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
overflow:hidden;
background:black;
}

video{

position:absolute;

top:50%;

left:50%;

width:100vw;

height:100vh;

object-fit:cover;

transform:translate(-50%,-50%);

z-index:1;

}

canvas{
display:none;
}

.overlay{

position:absolute;

top:0;

left:0;

width:100%;

height:100%;

object-fit:cover;

pointer-events:none;

z-index:10;

}

.buttons{

position:absolute;

bottom:55px;

left:0;

width:100%;

display:flex;

justify-content:space-between;

padding:0 35px;

box-sizing:border-box;

align-items:center;

z-index:20;

}

.photo{

width:78px;

height:78px;

border-radius:50%;

border:none;

background:white;

font-size:34px;

display:flex;

align-items:center;

justify-content:center;

box-shadow:0 0 20px rgba(0,0,0,0.4);

}

.insta{

height:68px;

padding:0 28px;

border:none;

border-radius:40px;

background:white;

font-size:20px;

font-weight:bold;

box-shadow:0 0 20px rgba(0,0,0,0.4);

}

</style>

</head>

<body>

<div id="container">

<video
id="video"
autoplay
playsinline
muted>
</video>

<canvas id="canvas"></canvas>

<img
src="overlay.png"
class="overlay">

<div class="buttons">

<button
class="photo"
onclick="takePhoto()">

📸

</button>

<button
class="insta"
onclick="openInstagramStory()">

Instagram

</button>

</div>

</div>

<script>

const video =
document.getElementById(
'video'
);

const canvas =
document.getElementById(
'canvas'
);

const ctx =
canvas.getContext(
'2d'
);

navigator.mediaDevices
.getUserMedia({

video:{

facingMode:{
ideal:"environment"
}

}

})

.then(stream=>{

video.srcObject =
stream;

});

function takePhoto(){

canvas.width = 1080;

canvas.height = 1920;

const videoRatio =
video.videoWidth /
video.videoHeight;

const canvasRatio =
1080 / 1920;

let drawWidth;
let drawHeight;
let offsetX;
let offsetY;

if(videoRatio > canvasRatio){

drawHeight = 1920;

drawWidth =
drawHeight *
videoRatio;

offsetX =
(drawWidth - 1080)
/ 2;

offsetY = 0;

}else{

drawWidth = 1080;

drawHeight =
drawWidth /
videoRatio;

offsetX = 0;

offsetY =
(drawHeight - 1920)
/ 2;

}

ctx.drawImage(

video,

-offsetX,

-offsetY,

drawWidth,

drawHeight

);

const overlay =
document.querySelector(
'.overlay'
);

ctx.drawImage(

overlay,

0,

0,

1080,

1920

);

const image =
canvas.toDataURL(
'image/png',
1.0
);

const link =
document.createElement(
'a'
);

link.href = image;

link.download =
'matahiti-story.png';

link.click();

}

function openInstagramStory(){

window.location.href =
'instagram://camera';

setTimeout(function(){

window.open(

'https://instagram.com/matahitibar.andernos',

'_blank'

);

},1000);

}

</script>

</body>

</html>
