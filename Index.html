<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
margin:0;
overflow:hidden;
background:black;
}

video{
position:fixed;
width:100%;
height:100%;
object-fit:cover;
}

.overlay{
position:fixed;
width:100%;
height:100%;
object-fit:cover;
pointer-events:none;
}

.text{
position:fixed;
bottom:30px;
width:100%;
text-align:center;
color:white;
font-size:24px;
font-family:sans-serif;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>

<img src="overlay.PNG" class="overlay">

<div class="text">
@nomdubar
</div>

<script>
navigator.mediaDevices.getUserMedia({
video:{ facingMode:"user" }
})
.then(function(stream){
document.getElementById("video").srcObject = stream;
});
</script>

</body>
</html>
